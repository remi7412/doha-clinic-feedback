<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doha Clinic Hospital - Feedback System</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth transition when layout flips to Right-to-Left (RTL) for Arabic */
        body { font-family: sans-serif; transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">

    <div class="max-w-xl mx-auto bg-white rounded-xl shadow-md p-8 relative">
        
        <!-- Language Switcher Button -->
        <button id="langToggle" onclick="toggleLanguage()" class="absolute top-4 right-4 bg-emerald-600 text-white px-3 py-1 rounded text-sm font-semibold hover:bg-emerald-700 transition">
            العربية
        </button>

        <!-- Hospital Header Placeholder -->
      <div class="max-w-xl mx-auto bg-white rounded-xl shadow-md relative overflow-hidden">
        
        <div class="w-full h-40 bg-slate-200 relative">
            <img src="cover.jpg" alt="Hospital Cover" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-b from-black/30 to-transparent"></div>
        </div>
        
        <div class="p-8 pt-6 relative">
            
            <button id="langToggle" onclick="toggleLanguage()" class="absolute -top-36 right-4 bg-emerald-600 text-white px-3 py-1 rounded text-sm font-semibold hover:bg-emerald-700 transition z-10 shadow-md">
                العربية
            </button>

            <div class="text-center mb-8 relative">
                <div class="w-24 h-24 bg-white p-2 rounded-full shadow-md flex items-center justify-center mx-auto -mt-20 relative z-10 border border-slate-100">
                    <img src="logo.png" alt="Doha Clinic Hospital Logo" class="max-w-full max-h-full object-contain">
                </div>
                
                <h2 id="formTitle" class="text-2xl font-bold text-slate-800 mt-4">Patient Feedback & Suggestion Box</h2>
                <p id="formSubtitle" class="text-slate-500 text-sm mt-1">We value your opinion to improve our healthcare services.</p>
            </div>

            <form id="feedbackForm" onsubmit="handleSubmit(event)" class="space-y-5">

        <!-- Form Starts Here -->
        <form id="feedbackForm" onsubmit="handleSubmit(event)" class="space-y-5">
            
            <!-- Patient Name -->
            <div>
                <label id="lblLabelName" class="block text-sm font-medium text-slate-700 mb-1">Full Name (Optional)</label>
                <input type="text" id="patientName" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none">
            </div>

            <!-- Patient Email -->
            <div>
                <label id="lblLabelEmail" class="block text-sm font-medium text-slate-700 mb-1">Email Address (Optional)</label>
                <input type="email" id="patientEmail" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none">
            </div>

            <!-- Patient Phone Number -->
            <div>
                <label id="lblLabelPhone" class="block text-sm font-medium text-slate-700 mb-1">Phone Number (Optional)</label>
                <input type="tel" id="patientPhone" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none">
            </div>

            <!-- Feedback Type (Dropdown) -->
            <div>
                <label id="lblLabelType" class="block text-sm font-medium text-slate-700 mb-1">What type of feedback would you like to share today? *</label>
                <select id="feedbackType" onchange="handleTypeChange()" required class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-white focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none">
                    <option value="" disabled selected id="optTypeSelect">Select an option...</option>
                    <option value="Compliment / ثناء" id="optCompliment">Compliment</option>
                    <option value="Comment / تعليق" id="optComment">Comment</option>
                    <option value="Complaint / شكوى" id="optComplaint">Complaint</option>
                    <option value="Inquire about a Lost Item (Security) / الاستفسار عن مفقودات" id="optLostItem">Inquire about a Lost Item (Security)</option>
                </select>
            </div>

            <!-- Department Selection (Dropdown) -->
            <div>
                <label id="lblLabelDept" class="block text-sm font-medium text-slate-700 mb-1">Which department or clinic did you visit? *</label>
                <select id="department" required class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-white focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none">
                    <option value="" disabled selected id="optDeptSelect">Select a department...</option>
                    <option value="Emergency / الطوارئ" id="optDeptEr">Emergency / ER</option>
                    <option value="Outpatient Clinics / العيادات الخارجية" id="optDeptOp">Outpatient Clinics</option>
                    <option value="Inpatient / الأقسام الداخلية" id="optDeptIp">Inpatient / Wards</option>
                    <option value="Laboratory & Radiology / المختبر والأشعة" id="optDeptLab">Laboratory / Radiology</option>
                    <option value="Pharmacy / الصيدلية" id="optDeptPharma">Pharmacy</option>
                    <option value="Administration & Billing / الإدارة والحسابات" id="optDeptAdmin">Administration / Billing</option>
                </select>
            </div>

            <!-- General Feedback Details -->
            <div>
                <label id="lblLabelDetails" class="block text-sm font-medium text-slate-700 mb-1">Please share your thoughts or details about your experience: *</label>
                <textarea id="feedbackDetails" required rows="4" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none"></textarea>
            </div>

            <!-- CONDITIONAL SECURITY FIELDS (Hidden by default) -->
            <div id="securitySection" class="hidden border-t border-slate-200 pt-4 space-y-4">
                <h3 id="secHeader" class="text-md font-bold text-emerald-800">Lost & Found Details / تفاصيل المفقودات</h3>
                
                <div>
                    <label id="lblLabelLostDesc" class="block text-sm font-medium text-slate-700 mb-1">Please describe the lost item (Color, brand, distinguishing marks): *</label>
                    <textarea id="lostItemDescription" rows="2" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none"></textarea>
                </div>

                <div>
                    <label id="lblLabelLostLoc" class="block text-sm font-medium text-slate-700 mb-1">Where or around what time do you think it went missing? *</label>
                    <input type="text" id="estimatedLocationLost" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="btnSubmit" class="w-full bg-emerald-600 text-white font-semibold py-3 px-4 rounded-lg hover:bg-emerald-700 shadow transition duration-200">
                Submit Feedback
            </button>
        </form>
    </div>

    <!-- JavaScript Handling Languages, Conditional Logic, and Backend Pipeline -->
    <script>
        let currentLang = 'en';

        // Dictionary containing both language variants
        const translations = {
            en: {
                toggleBtn: "العربية",
                title: "Patient Feedback & Suggestion Box",
                subtitle: "We value your opinion to improve our healthcare services.",
                name: "Full Name (Optional)",
                email: "Email Address (Optional)",
                phone: "Phone Number (Optional)",
                type: "What type of feedback would you like to share today? *",
                typeSelect: "Select an option...",
                compliment: "Compliment",
                comment: "Comment",
                complaint: "Complaint",
                lostItem: "Inquire about a Lost Item (Security)",
                dept: "Which department or clinic did you visit? *",
                deptSelect: "Select a department...",
                details: "Please share your thoughts or details about your experience: *",
                lostDesc: "Please describe the lost item (Color, brand, distinguishing marks): *",
                lostLoc: "Where or around what time do you think it went missing? *",
                submit: "Submit Feedback"
            },
           function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            
            // Adjust form direction (Right-To-Left for Arabic, Left-To-Right for English)
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;

            // Apply translations to static labels
            document.getElementById('langToggle').innerText = translations[currentLang].toggleBtn;
            document.getElementById('formTitle').innerText = translations[currentLang].title;
            document.getElementById('formSubtitle').innerText = translations[currentLang].subtitle;
            document.getElementById('lblLabelName').innerText = translations[currentLang].name;
            document.getElementById('lblLabelEmail').innerText = translations[currentLang].email;
            document.getElementById('lblLabelPhone').innerText = translations[currentLang].phone;
            document.getElementById('lblLabelType').innerText = translations[currentLang].type;
            document.getElementById('lblLabelDept').innerText = translations[currentLang].dept;
            document.getElementById('lblLabelDetails').innerText = translations[currentLang].details;
            document.getElementById('lblLabelLostDesc').innerText = translations[currentLang].lostDesc;
            document.getElementById('lblLabelLostLoc').innerText = translations[currentLang].lostLoc;
            document.getElementById('btnSubmit').innerText = translations[currentLang].submit;

            // Fix Dropdown inner text for Type
            document.getElementById('optTypeSelect').innerText = translations[currentLang].typeSelect;
            document.getElementById('optCompliment').innerText = translations[currentLang].compliment;
            document.getElementById('optComment').innerText = translations[currentLang].comment;
            document.getElementById('optComplaint').innerText = translations[currentLang].complaint;
            document.getElementById('optLostItem').innerText = translations[currentLang].lostItem;

            // Fix Dropdown inner text for Department
            document.getElementById('optDeptSelect').innerText = translations[currentLang].deptSelect;
            document.getElementById('optDeptEr').innerText = translations[currentLang].deptSelect === "Select a department..." ? "Emergency / ER" : "الطوارئ";
            document.getElementById('optDeptOp').innerText = translations[currentLang].deptSelect === "Select a department..." ? "Outpatient Clinics" : "العيادات الخارجية";
            document.getElementById('optDeptIp').innerText = translations[currentLang].deptSelect === "Select a department..." ? "Inpatient / Wards" : "الأقسام الداخلية";
            document.getElementById('optDeptLab').innerText = translations[currentLang].deptSelect === "Select a department..." ? "Laboratory / Radiology" : "المختبر / الأشعة";
            document.getElementById('optDeptPharma').innerText = translations[currentLang].deptSelect === "Select a department..." ? "Pharmacy" : "الصيدلية";
            document.getElementById('optDeptAdmin').innerText = translations[currentLang].deptSelect === "Select a department..." ? "Administration / Billing" : "الإدارة / الحسابات";
        }
            // Adjust form direction (Right-To-Left for Arabic, Left-To-Right for English)
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;

            // Apply translations to elements
            document.getElementById('langToggle').innerText = translations[currentLang].toggleBtn;
            document.getElementById('formTitle').innerText = translations[currentLang].title;
            document.getElementById('formSubtitle').innerText = translations[currentLang].subtitle;
            document.getElementById('lblLabelName').innerText = translations[currentLang].name;
            document.getElementById('lblLabelEmail').innerText = translations[currentLang].email;
            document.getElementById('lblLabelPhone').innerText = translations[currentLang].phone;
            document.getElementById('lblLabelType').innerText = translations[currentLang].type;
            document.getElementById('optTypeSelect').innerText = translations[currentLang].typeSelect;
            document.getElementById('lblLabelDept').innerText = translations[currentLang].dept;
            document.getElementById('optDeptSelect').innerText = translations[currentLang].deptSelect;
            document.getElementById('lblLabelDetails').innerText = translations[currentLang].details;
            document.getElementById('lblLabelLostDesc').innerText = translations[currentLang].lostDesc;
            document.getElementById('lblLabelLostLoc').innerText = translations[currentLang].lostLoc;
            document.getElementById('btnSubmit').innerText = translations[currentLang].submit;
        }

        // Handle displaying the Security section dynamically based on selection
        function handleTypeChange() {
            const typeValue = document.getElementById('feedbackType').value;
            const securitySection = document.getElementById('securitySection');
            const descInput = document.getElementById('lostItemDescription');
            const locInput = document.getElementById('estimatedLocationLost');

            if (typeValue.includes('Inquire about a Lost Item')) {
                securitySection.classList.remove('hidden');
                descInput.required = true;
                locInput.required = true;
            } else {
                securitySection.classList.add('hidden');
                descInput.required = false;
                locInput.required = false;
            }
        }

        // Send submission data to Webhook URL
        async function handleSubmit(event) {
            event.preventDefault();
            
            // Collect Form Values
            const formData = {
                patientName: document.getElementById('patientName').value,
                patientEmail: document.getElementById('patientEmail').value,
                patientPhone: document.getElementById('patientPhone').value,
                type: document.getElementById('feedbackType').value,
                department: document.getElementById('department').value,
                feedbackDetails: document.getElementById('feedbackDetails').value,
                lostItemDescription: document.getElementById('lostItemDescription').value || "",
                estimatedLocationLost: document.getElementById('estimatedLocationLost').value || ""
            };

            // REPLACE THIS URL with your n8n Webhook URL or Airtable Webhook URL
            const webhookURL = "https://your-webhook-url-here.com";

            try {
                const response = await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert(currentLang === 'en' ? "Thank you! Your feedback has been submitted successfully." : "شكراً لك! تم إرسال ملاحظتك بنجاح.");
                    document.getElementById('feedbackForm').reset();
                    handleTypeChange(); // Re-hide security block
                } else {
                    throw new Error("Submission failed");
                }
            } catch (error) {
                alert(currentLang === 'en' ? "An error occurred. Please try again." : "حدث خطأ ما. يرجى المحاولة مرة أخرى.");
                console.error(error);
            }
        }
    </script>
</body>
</html>
